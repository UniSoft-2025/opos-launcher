name: Windows EXE yarat

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        app: [cafe, hotel]
    steps:
      - name: Kodu al
        uses: actions/checkout@v4

      - name: Node.js quraşdır
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Paketləri yüklə
        working-directory: ${{ matrix.app }}
        run: npm install

      - name: Windows EXE tərtib et
        working-directory: ${{ matrix.app }}
        run: npm run build:win

      - name: Nəticəni yüklə (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app }}-windows-installer
          path: |
            ${{ matrix.app }}/dist/*.exe
